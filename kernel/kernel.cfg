
SYMBOLS {
    __KERNEL_LOAD__:  type = export, value = $0200;
    __KERNEL_ENTRY__: type = export, value = $8000;
    __BOOT_START__:    type = export, value = $F000;
    __HOOK_START__:    type = export, value = $F1FA;

    __KERNEL_SIZE__:  type = export, value = __BOOT_START__ - __KERNEL_LOAD__;
    __STACK_START__:  type = export, value = __KERNEL_ENTRY__;
}

MEMORY {
    RAM:  start = $0000, size = $F000, fill = yes, type = rw;
    TRAP: start = $F000, size = $0C00, fill = yes, type = rw;
    MMIO:  start = $FC00, size = $0400, fill = yes, type = rw;
}

SEGMENTS {
    ZEROPAGE: load = RAM, type = zp;

    DATA:     load = RAM, type = rw, start = __KERNEL_LOAD__;
    RODATA:   load = RAM, type = ro;
    BSS:      load = RAM, type = bss, define = yes;

    STARTUP:  load = RAM, type = ro, start = __KERNEL_ENTRY__;
    CODE:     load = RAM, type = ro;

    BOOT:     load = TRAP, type = ro, start = __BOOT_START__;
    HOOK:     load = TRAP, type = rw, start = __HOOK_START__;
}
