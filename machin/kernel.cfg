
SYMBOLS {
    __KERNEL_LOAD__:  type = export, value = $0200;
    __KERNEL_SIZE__:  type = export, value = $F000-$0200;
    __KERNEL_ENTRY__: type = export, value = $8000;
    __STACK_START__:  type = export, value = $1000;
}

MEMORY {
    MUST:  start = $0000, size = $F000, fill = yes, type = rw;
    SEG15: start = $F000, size = $0C00, fill = yes, type = rw;
    MMIO:  start = $FC00, size = $0400, fill = yes, type = rw;
}

SEGMENTS {
    ZEROPAGE:   load = MUST, type = rw, start = $0000;
    DATA:       load = MUST, type = rw, start = __KERNEL_LOAD__+$0000;
    RODATA:     load = MUST, type = ro, start = __KERNEL_LOAD__+$1000;
    BSS:        load = MUST, type = rw, start = __KERNEL_LOAD__+$2000;

    STARTUP:    load = MUST, type = ro, define yes, start = __KERNEL_ENTRY__;
    CODE:       load = MUST, type = ro, start = __KERNEL_ENTRY__+$1000;

    BOOT:       load = SEG15, type = ro, start = $F000;
    HOOK:       load = SEG15, type = rw, start = $F000+$1FA;
}
