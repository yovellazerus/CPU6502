MEMORY {
    RAM: start = $0000, size = $FF00, fill = no, type = rw;
    ROM: start = $FF00, size = $0100, fill = no, type = ro;
}

SEGMENTS {
    ZEROPAGE:   load = RAM, type = rw, start = $0000;
    DATA:       load = RAM, type = rw, start = $0200;
    BSS:        load = RAM, type = rw, start = $1000;

    STARTUP:    load = ROM, type = ro, define yes, start = $FF00;
    CODE:       load = ROM, type = ro, start = $FF10;
    RODATA:     load = ROM, type = ro, start = $FFE0;
    VECTORS:    load = ROM, type = ro, start = $FFFA;
}
